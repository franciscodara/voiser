name: finwise
description: Gestão de orçamento doméstico com voz e Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^14.2.7

  # HTTP
  dio: ^5.4.3+1

  # Armazenamento local
  hive_flutter: ^1.1.0
  flutter_secure_storage: any
  shared_preferences: ^2.5.5

  # Voz
  speech_to_text: any
  flutter_siri_shortcuts: any
  android_intent_plus: ^6.0.0

  # UI & Gráficos
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  lottie: any
  cached_network_image: ^3.3.1

  # Utilitários
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dartz: ^0.10.1       # Either type para error handling
  http: ^1.6.0
  connectivity_plus: ^7.1.0
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.3
  very_good_analysis: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/app_icon.png
    - assets/branding/app_icon_foreground.png
    - assets/branding/splash_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png

flutter_native_splash:
  color: "#000000"
  image: assets/branding/splash_icon.png
  android: true
  ios: true
  android_12:
    color: "#000000"
    image: assets/branding/splash_icon.png
    icon_background_color: "#000000"

